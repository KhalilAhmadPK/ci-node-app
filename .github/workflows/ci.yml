name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint:fix

  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run tests with coverage
        run: npm test

      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          version: '22'
          cache: 'npm'

      - name: Install production Dependencies
        run: npm install --omit=dev

      - name: Run build check
        run: npm run build

      - name: verify app starts correctly
        run: |
          # Run app in background
          node index.js &
          APP_PID=$!

          # Wait 3 seconds
          sleep 3

          # Hit health endpoint
          curl --fail http://localhost:3000/api/health

          # cleanup
          kill $APP_PID
          echo "App started and responded successfully"



